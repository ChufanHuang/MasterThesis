# Dictionary for narrative identification.
#
# This dictionary is used for dictionary-based narrative annotation in the
# thesis pipeline. Each top-level key is a narrative label.
#
# Notes:
# - Narrative labels are kept stable because downstream scripts and thesis
#   outputs depend on these exact names.
# - `keywords_core` are used by the matching scripts.
# - `hashtags` document relevant hashtag variants.
# - `keywords_expanded`, where present, are auxiliary terms.

# =========================
# Science-related narratives
# =========================

